name: Release APK

# Build and publish a signed release APK whenever a tag matching v* is pushed,
# or when triggered manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / freezed / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/enya-gitarre-leicht-${{ steps.tag.outputs.value }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enya-gitarre-leicht-${{ steps.tag.outputs.value }}
          path: artifacts/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: E-Gitarre Leicht ${{ steps.tag.outputs.value }}
          body: |
            ## E-Gitarre Leicht ${{ steps.tag.outputs.value }}

            Gamifizierte E-Gitarren-Lern-App für die Enya XMARI Smart Guitar.

            ### Installation
            1. APK herunterladen
            2. Auf dem Android-Gerät "Installation aus unbekannten Quellen" erlauben
            3. APK öffnen und installieren

            ### Backend
            Supabase (eu-central-1) — Auth, Sync und Recordings-Storage sind eingebunden.

            **Build:** ${{ github.sha }}
          draft: false
          prerelease: false
          files: artifacts/*.apk
