name: 🏗️ Build & Release APK

# Release-Build triggert auf drei Wegen:
#   1. Push auf main mit geänderter pubspec.yaml-Version — VOLLAUTOMATISCH
#      (Tag wird vom Workflow selbst via softprops/action-gh-release erstellt).
#      Changelog wird automatisch aus Git-Commits seit letztem Tag generiert.
#   2. Explizit gepushter Version-Tag (v1.0.0, v1.0.1 …) — manueller Weg.
#   3. workflow_dispatch — manuelles Triggern aus der UI (auch für Feature-Branches).

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version_note:
        description: 'Versions-Notiz (optional)'
        required: false
        default: 'Manueller Build'

permissions:
  contents: write

jobs:
  # Pre-Check: bauen wir wirklich? Skipt wenn Release für aktuelle Version schon existiert.
  check:
    name: 🔎 Release-Bedarf prüfen
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.v.outputs.version }}
      should_build: ${{ steps.v.outputs.should_build }}
      prev_version: ${{ steps.v.outputs.prev_version }}
      changelog:    ${{ steps.v.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # volle Git-History für Changelog-Generierung
      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d ' ')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Bei Tag-Push IMMER bauen (expliziter Release-Wunsch).
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "✅ Tag-Push → bauen"
            SHOULD_BUILD=true
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "✅ workflow_dispatch → bauen"
            SHOULD_BUILD=true
          else
            # Bei main-Push: nur bauen wenn GitHub-Release noch fehlt.
            if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "⏭️  Release v$VERSION existiert bereits — skip"
              SHOULD_BUILD=false
            else
              echo "✅ Kein Release für v$VERSION → bauen"
              SHOULD_BUILD=true
            fi
          fi
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT

          # GUARD: Build-Nummer (Android versionCode) MUSS strikt steigen damit
          # Upgrades funktionieren. Vergleich gegen den letzten released Tag.
          if [ "$SHOULD_BUILD" = "true" ]; then
            LAST_RELEASED_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 \
              --json tagName --jq '.[0].tagName // empty' 2>/dev/null || true)
            if [ -n "$LAST_RELEASED_TAG" ]; then
              LAST_BUILD=$(git show "$LAST_RELEASED_TAG:pubspec.yaml" 2>/dev/null \
                | grep '^version:' | sed 's/.*+//' | tr -d ' ' || echo "")
              if [ -n "$LAST_BUILD" ]; then
                if [ "$BUILD_NUMBER" -le "$LAST_BUILD" ]; then
                  echo "❌ Build-Nummer $BUILD_NUMBER ist nicht größer als $LAST_BUILD ($LAST_RELEASED_TAG)."
                  echo "   Fix: pubspec.yaml version: $VERSION+<größer als $LAST_BUILD>"
                  exit 1
                fi
                echo "✅ Build-Nummer-Guard: $BUILD_NUMBER > $LAST_BUILD ($LAST_RELEASED_TAG)"
              fi
            fi
          fi

          # AUTO min_version: letzte veröffentlichte GitHub-Release-Version.
          PREV_VERSION=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 \
            --json tagName --jq '.[0].tagName // empty' 2>/dev/null | sed 's/^v//' || true)
          if [ -z "$PREV_VERSION" ]; then
            PREV_VERSION="$VERSION"
            echo "ℹ️  Kein vorheriger Release → prev_version=$PREV_VERSION"
          else
            echo "✅ prev_version=$PREV_VERSION"
          fi
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT

          # AUTO changelog: Commits seit letztem Tag (oder letzte 10 bei Erst-Release).
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" | head -20 || true)
          else
            CHANGELOG=$(git log --pretty=format:"• %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" || true)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="• Bugfixes und Verbesserungen"
          fi

          {
            echo "changelog<<EOF_CHANGELOG"
            echo "$CHANGELOG"
            echo "EOF_CHANGELOG"
          } >> $GITHUB_OUTPUT
          echo "✅ Changelog generiert (seit ${LAST_TAG:-initial}):"
          echo "$CHANGELOG"

  build-apk:
    name: 🔨 Release Build
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: 🔐 Release-Keystore aus Secrets dekodieren
        # Secrets (einmalig in GitHub Repo → Settings → Secrets einrichten):
        #   ANDROID_KEYSTORE_BASE64   — base64 der enya.jks
        #   ANDROID_KEYSTORE_PASSWORD — store-password
        #   ANDROID_KEY_ALIAS         — Alias (z.B. "enya")
        #   ANDROID_KEY_PASSWORD      — key-password
        # Ohne Secrets → Step überspringt, Build nutzt Debug-Key.
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/enya.jks
          cat > android/key.properties <<EOF
          storeFile=app/enya.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "✅ Release-Keystore + key.properties erstellt"

      - name: 📋 Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apk_name=enya-gitarre-leicht-v${VERSION}-universal.apk" >> $GITHUB_OUTPUT

      - name: 📦 flutter pub get
        run: flutter pub get

      - name: 🛠 Code-Generierung (drift / freezed / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔍 flutter analyze
        run: flutter analyze --no-fatal-infos || true

      - name: 🏗️ Release APK bauen
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=APP_VERSION=${{ steps.version.outputs.version }} \
            --dart-define=SUPABASE_URL=https://bosxikglcxojjcehbgcg.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvc3hpa2dsY3hvampjZWhiZ2NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDY4OTgsImV4cCI6MjA5MzU4Mjg5OH0.UIWVkMtXtGgpBFwiRqo3684ajIORnDPuecYMzMSaySI

      - name: 📝 APK umbenennen
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          ls -lh build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: 📤 APK Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      - name: 🚀 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }} – E-Gitarre Leicht
          body: |
            ## E-Gitarre Leicht v${{ steps.version.outputs.version }}

            Gamifizierte E-Gitarren-Lern-App für die Enya XMARI Smart Guitar.

            ### Was ist neu
            ${{ needs.check.outputs.changelog }}

            ### Installation
            APK herunterladen und auf dem Gerät installieren (Sideloading).
            Auf dem Gerät "Installation aus unbekannten Quellen" erlauben, dann
            die `.apk` öffnen.

            ### Backend
            Supabase (eu-central-1) ist eingebunden — Auth, Cloud-Sync und
            Recordings-Storage sind aktiv.
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Supabase app_config aktualisieren (In-App-Update-Dialog)
        # Hebt public.app_config auf die neue Version. Erst NACH erfolgreichem
        # GitHub-Release — sonst würden User einen 404 beim APK-Download sehen.
        # Nutzt SUPABASE_SERVICE_ROLE_KEY (umgeht RLS).
        env:
          SUPABASE_URL: https://bosxikglcxojjcehbgcg.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          MIN_VERSION: ${{ needs.check.outputs.prev_version }}
          CHANGELOG: ${{ needs.check.outputs.changelog }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY Secret fehlt — app_config wurde NICHT aktualisiert"
            exit 0
          fi

          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/enya-gitarre-leicht-v${VERSION}-universal.apk"
          NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}"

          BODY=$(jq -n \
            --arg lv "$VERSION" \
            --arg mv "$MIN_VERSION" \
            --arg url "$APK_URL" \
            --arg cl "$CHANGELOG" \
            --arg notes "$NOTES_URL" \
            '{platform:"android", latest_version:$lv, min_version:$mv, apk_download_url:$url, changelog:$cl, release_notes_url:$notes}')

          echo "→ UPSERT app_config: latest=$VERSION min=$MIN_VERSION"
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/app_config?on_conflict=platform" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$BODY")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Supabase-Update fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/resp.json
            exit 1
          fi
          echo "✅ app_config aktualisiert"
          cat /tmp/resp.json | jq '.'

      - name: 📜 update_history Eintrag schreiben
        env:
          SUPABASE_URL: https://bosxikglcxojjcehbgcg.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG: ${{ needs.check.outputs.changelog }}
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt — kein History-Eintrag"
            exit 0
          fi
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(jq -n \
            --arg v "$VERSION" \
            --arg cl "$CHANGELOG" \
            --arg url "$RUN_URL" \
            '{"type":"release","version":$v,"changelog":$cl,"github_run_url":$url}')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/update_history" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY")
          [ "$HTTP_CODE" = "201" ] && echo "✅ update_history Eintrag (release) gesetzt" \
            || echo "⚠️  update_history INSERT fehlgeschlagen (HTTP $HTTP_CODE)"
