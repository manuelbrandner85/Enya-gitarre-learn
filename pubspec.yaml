name: enya_gitarre_learn
description: E-Gitarre Leicht - Gamifizierte E-Gitarren-Lern-App für die Enya XMARI
version: 1.7.1+12
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # STATE MANAGEMENT
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # NAVIGATION
  go_router: ^14.8.1

  # AUDIO
  just_audio: ^0.9.42
  record: ^6.2.0
  audio_session: ^0.1.21
  audio_waveforms: ^1.3.0

  # BLUETOOTH
  flutter_blue_plus: ^1.35.3

  # GAME ENGINE
  flame: ^1.22.0
  flame_audio: ^2.10.7

  # SUPABASE (auth, postgres, storage)
  supabase_flutter: ^2.8.0

  # LOCAL DATABASE
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.25

  # FONTS
  google_fonts: ^6.2.1

  # UI & ANIMATIONS
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  confetti: ^0.7.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.4
  shimmer: ^3.0.0

  # UTILS
  shared_preferences: ^2.3.5
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  collection: ^1.18.0
  equatable: ^2.0.7
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.14
  wakelock_plus: ^1.2.10
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # SOCIAL AUTH
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.5

  # HANDS-FREE + SHARING
  speech_to_text: ^7.0.0
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.22.1
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/audio/
    - assets/audio/notes/
    - assets/audio/chords/
    - assets/audio/backing_tracks/
    - assets/images/
    - assets/animations/
    - assets/animations/techniques/
